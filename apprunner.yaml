version: 1
applications:
  # --- ユーザー向けフロントエンドの設定 ---
  - appRoot: apps/user_front
    env:
      - name: AMPLIFY_MONOREPO_APP_ROOT
        value: apps/user_front
      - name: AMPLIFY_DIFF_DEPLOY
        value: 'false'
    phases:
      preBuild:
        commands:
          - npm ci
      build:
        commands:
          - aws ssm get-parameter --name "/amplify/user-front/.env" --with-decryption --query "Parameter.Value" --output text > .env
          # DBマイグレーションはどちらか一方で実行すればOK
          - npx prisma migrate deploy
          - npm run build
    artifacts:
      baseDirectory: .next
      files:
        - '**/*'
    cache:
      paths:
        - .next/cache/**/*

  # --- 管理者向けフロントエンドの設定（追加） ---
  # - appRoot: apps/admin_front
  #   env:
  #     - name: AMPLIFY_MONOREPO_APP_ROOT
  #       value: apps/admin_front
  #     - name: AMPLIFY_DIFF_DEPLOY
  #       value: 'false'
  #   phases:
  #     # preBuildは共通なので省略可能
  #     build:
  #       commands:
  #         # admin_front用の環境変数をSSMから取得
  #         - aws ssm get-parameter --name "/amplify/admin-front/.env" --with-decryption --query "Parameter.Value" --output text > .env
  #         # admin_frontをビルド
  #         - npm run build
  #   artifacts:
  #     baseDirectory: .next
  #     files:
  #       - '**/*'
  #   cache:
  #     paths:
  #       - .next/cache/**/*

  # --- 共通パッケージの定義 ---
  - appRoot: packages/db
  - appRoot: packages/factories
  - appRoot: packages/seeders
  - appRoot: packages/tsconfig
cache:
  paths:
    - node_modules/**/*
