################################################################################
# .github/workflows/ci-cd-env.yml
# CI/CD for Staging and Production via workflow_dispatch input
################################################################################
name: CI/CD (Staging/Production)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to deploy'
        required: true
        type: choice
        options:
          - stg
          - prod

environment:
  name: ${{ github.event.inputs.environment }}
jobs:
  # 1) Terraform: Infra setup (ECR + App Runner)
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_ENV: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ github.event.inputs.environment }}/terraform.tfstate"

      - name: Terraform Apply (Infra)
        run: |
          terraform apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment }}"
        env:
          AWS_DEFAULT_PROFILE: ${{ secrets.AWS_PROFILE }}

  # 2) Build & Push Docker image to ECR
  push_image:
    runs-on: ubuntu-latest
    needs: terraform
    env:
      ENV: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.GITHUB_OIDC_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=${{ secrets.ECR_REPOSITORY }}-${ENV}
          docker build -t ${{ steps.login.outputs.registry }}/$REPO:$IMAGE_TAG .
          docker push ${{ steps.login.outputs.registry }}/$REPO:$IMAGE_TAG

  # 3) Deploy App Runner Service
  deploy_apprunner:
    runs-on: ubuntu-latest
    needs: push_image
    env:
      ENV: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.GITHUB_OIDC_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Update App Runner Service
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=${{ secrets.ECR_REPOSITORY }}-${ENV}
          aws apprunner update-service \
            --service-arn ${{ secrets.APP_RUNNER_SERVICE_ARN_${ENV^^} }} \
            --source-configuration '{
              "ImageRepository":{
                "ImageIdentifier":"'${{ steps.login.outputs.registry }}/$REPO:$IMAGE_TAG'",
                "ImageRepositoryType":"ECR",
                "ImageConfiguration":{"Port":"${{ secrets.CONTAINER_PORT }}"}
              },
              "AutoDeploymentsEnabled":true
            }'
