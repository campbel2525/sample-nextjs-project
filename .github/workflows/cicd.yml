name: CI/CD Pipeline Build → ECR → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --prefix apps/user_front

      - name: Build
        run: npm run build --prefix apps/user_front

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/github_action/user_front/Dockerfile .
          docker push $URI
          echo "image-uri=$URI" >> $GITHUB_OUTPUT

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        id: deploy
        run: |
          SERVICE_ARN="${{ vars.APPRUNNER_SERVICE_ARN }}"
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          SOURCE_CONFIGURATION="{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\"}}"
          OPERATION_ID=$(aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "$SOURCE_CONFIGURATION" | jq -r '.OperationId')
          echo "operation-id=$OPERATION_ID" >> $GITHUB_OUTPUT

      - name: Wait for App Runner Deployment
        run: |
          SERVICE_ARN="${{ vars.APPRUNNER_SERVICE_ARN }}"
          OPERATION_ID="${{ steps.deploy.outputs.operation-id }}"
          echo "Waiting for deployment to complete... (Operation ID: $OPERATION_ID)"
          for i in $(seq 1 60); do
            STATUS=$(aws apprunner describe-operation --operation-id "$OPERATION_ID" --service-arn "$SERVICE_ARN" | jq -r '.OperationSummary.Status')
            echo "Current status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Deployment succeeded."
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed."
              exit 1
            fi
            if [ $i -eq 60 ]; then
              echo "❌ Timeout waiting for deployment."
              exit 1
            fi
            sleep 10
          done

      - name: Verify Deployed Image Tag
        run: |
          SERVICE_ARN="${{ vars.APPRUNNER_SERVICE_ARN }}"
          EXPECTED_IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          # Give a few seconds for describe-service to reflect the new image
          sleep 5
          CURRENT_IMAGE_URI=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" | jq -r '.Service.SourceConfiguration.ImageRepository.ImageIdentifier')
          echo "🔍 Expected Image: $EXPECTED_IMAGE_URI"
          echo "🔍 Deployed Image: $CURRENT_IMAGE_URI"
          if [ "$CURRENT_IMAGE_URI" != "$EXPECTED_IMAGE_URI" ]; then
            echo "❌ Deployed image does not match expected tag. Failing job."
            exit 1
          fi
          echo "✅ Deployed image matches expected tag."
