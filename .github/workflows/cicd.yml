name: CI/CD Pipeline Build → ECR → Lambda → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install root & workspaces
        run: npm install --workspaces

      - name: Install user_front dependencies
        run: npm --workspace=apps/user_front install

      - name: Build user_front
        run: npm --workspace=apps/user_front run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          REGISTRY=${{ steps.login.outputs.registry }}
          REPO_NAME=${{ vars.USER_FRONT_ECR_REPOSITORY_NAME }}

          # Build image with SHA tag
          URI_SHA=${REGISTRY}/${REPO_NAME}:${IMAGE_TAG}
          URI_LATEST=${REGISTRY}/${REPO_NAME}:latest

          docker build -t $URI_SHA -f docker/github_action/user_front/Dockerfile .

          # Tag the same image with latest
          docker tag $URI_SHA $URI_LATEST

          # Push both tags
          docker push $URI_SHA
          docker push $URI_LATEST

          echo "🔍 Pushed tags: $IMAGE_TAG, latest"
          echo "image-uri=$URI_SHA" >> $GITHUB_OUTPUT

  deploy-lambda:
    environment: ${{ github.ref_name }}
    name: 🛠 Deploy & Invoke Lambda (Migrations)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Update Lambda from ECR Image
        run: |
          echo "🔍 Updating Lambda function: ${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}"
          echo "🔍 Using image: ${{ needs.build-and-push.outputs.image-uri }}"

          aws lambda update-function-code \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --image-uri     "${{ needs.build-and-push.outputs.image-uri }}"

          echo "✅ Lambda function updated successfully"

      - name: Wait for Lambda Update
        run: |
          echo "⏳ Waiting for Lambda function to be ready..."

          for i in $(seq 1 30); do
            STATE=$(aws lambda get-function --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" --query 'Configuration.State' --output text)
            echo "Current state: $STATE"

            if [ "$STATE" = "Active" ]; then
              echo "✅ Lambda function is ready"
              break
            fi

            if [ "$STATE" = "Failed" ]; then
              echo "❌ Lambda function update failed"
              exit 1
            fi

            if [ $i -eq 30 ]; then
              echo "❌ Timeout waiting for Lambda function to be ready"
              exit 1
            fi

            sleep 10
          done

      - name: Invoke Migrations Lambda
        run: |
          echo "🚀 Invoking migration Lambda function..."

          # 同期実行でレスポンスを取得
          aws lambda invoke \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --invocation-type RequestResponse \
            --payload '{}' \
            response.json

          # レスポンスを表示
          echo "📋 Lambda response:"
          cat response.json

          # エラーチェック
          if grep -q '"statusCode": 500' response.json; then
            echo "❌ Migration failed"
            exit 1
          fi

          echo "✅ Migration completed successfully"

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: [build-and-push, deploy-lambda]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        id: deploy
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"

          # Debug output
          echo "🔍 SERVICE_ARN: $SERVICE_ARN"
          echo "🔍 IMAGE_URI: $IMAGE_URI"

          # Validate required variables
          if [ -z "$SERVICE_ARN" ]; then
            echo "❌ SERVICE_ARN is empty. Please check the USER_FRONT_APPRUNNER_ARN variable in your environment."
            exit 1
          fi

          if [ -z "$IMAGE_URI" ]; then
            echo "❌ IMAGE_URI is empty. Please check the previous build step."
            exit 1
          fi

          SOURCE_CONFIGURATION="{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\"}}"
          echo "🔍 SOURCE_CONFIGURATION: $SOURCE_CONFIGURATION"

          # Update the service with new image
          OPERATION_ID=$(aws apprunner update-service \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "$SOURCE_CONFIGURATION" \
            --query 'OperationId' --output text)

          echo "🔍 OPERATION_ID: $OPERATION_ID"

          # Validate operation ID
          if [ -z "$OPERATION_ID" ] || [ "$OPERATION_ID" = "null" ]; then
            echo "❌ Failed to get OPERATION_ID from update-service command."
            exit 1
          fi

          echo "operation-id=$OPERATION_ID" >> $GITHUB_OUTPUT

      - name: Wait for App Runner Deployment
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          OPERATION_ID="${{ steps.deploy.outputs.operation-id }}"

          echo "Waiting for deployment to complete... (Operation ID: $OPERATION_ID)"

          # Wait for deployment to complete
          for i in $(seq 1 60); do
            # Check service status
            SERVICE_STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.Status' --output text)
            echo "Current service status: $SERVICE_STATUS"

            if [ "$SERVICE_STATUS" = "RUNNING" ]; then
              echo "✅ Service is running."

              # Additional check: verify the service is actually healthy
              sleep 30  # Wait a bit for the service to fully start

              # Check service status again after waiting
              FINAL_STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.Status' --output text)
              echo "Final service status: $FINAL_STATUS"

              if [ "$FINAL_STATUS" = "RUNNING" ]; then
                echo "✅ Deployment succeeded and service is stable."
                break
              else
                echo "❌ Service became unstable after initial success."
                exit 1
              fi
            fi

            if [ "$SERVICE_STATUS" = "CREATE_FAILED" ] || [ "$SERVICE_STATUS" = "UPDATE_FAILED" ] || [ "$SERVICE_STATUS" = "DELETE_FAILED" ]; then
              echo "❌ Deployment failed with status: $SERVICE_STATUS"

              # Get more detailed error information
              aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.ServiceUrl' --output text || echo "No service URL available"

              exit 1
            fi

            if [ $i -eq 60 ]; then
              echo "❌ Timeout waiting for deployment. Final status: $SERVICE_STATUS"
              exit 1
            fi

            sleep 10
          done

      - name: Verify Deployed Image
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          EXPECTED_IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"

          # Give a few seconds for describe-service to reflect the new image
          sleep 5

          CURRENT_IMAGE_URI=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" | jq -r '.Service.SourceConfiguration.ImageRepository.ImageIdentifier')

          echo "🔍 Expected Image: $EXPECTED_IMAGE_URI"
          echo "🔍 Deployed Image: $CURRENT_IMAGE_URI"

          if [ "$CURRENT_IMAGE_URI" != "$EXPECTED_IMAGE_URI" ]; then
            echo "❌ Deployed image does not match expected tag. Failing job."
            exit 1
          fi

          echo "✅ Deployed image matches expected tag."
