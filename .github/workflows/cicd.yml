name: CI/CD Pipeline Build → ECR → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --prefix apps/user_front

      - name: Build
        run: npm run build --prefix apps/user_front

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ vars.USER_FRONT_ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/github_action/user_front/Dockerfile .
          docker push $URI
          echo "image-uri=$URI" >> $GITHUB_OUTPUT

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        id: deploy
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"

          # Debug output
          echo "🔍 SERVICE_ARN: $SERVICE_ARN"
          echo "🔍 IMAGE_URI: $IMAGE_URI"

          # Validate required variables
          if [ -z "$SERVICE_ARN" ]; then
            echo "❌ SERVICE_ARN is empty. Please check the USER_FRONT_APPRUNNER_ARN variable in your environment."
            exit 1
          fi

          if [ -z "$IMAGE_URI" ]; then
            echo "❌ IMAGE_URI is empty. Please check the previous build step."
            exit 1
          fi

          SOURCE_CONFIGURATION="{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\"}}"
          echo "🔍 SOURCE_CONFIGURATION: $SOURCE_CONFIGURATION"

          OPERATION_ID=$(aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "$SOURCE_CONFIGURATION" | jq -r '.OperationId')

          echo "🔍 OPERATION_ID: $OPERATION_ID"

          # Validate operation ID
          if [ -z "$OPERATION_ID" ] || [ "$OPERATION_ID" = "null" ]; then
            echo "❌ Failed to get OPERATION_ID from start-deployment command."
            exit 1
          fi

          echo "operation-id=$OPERATION_ID" >> $GITHUB_OUTPUT

      - name: Wait for App Runner Deployment
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          OPERATION_ID="${{ steps.deploy.outputs.operation-id }}"

          # Debug output
          echo "🔍 SERVICE_ARN: $SERVICE_ARN"
          echo "🔍 OPERATION_ID: $OPERATION_ID"

          # Validate required variables
          if [ -z "$SERVICE_ARN" ]; then
            echo "❌ SERVICE_ARN is empty. Please check the USER_FRONT_APPRUNNER_ARN variable in your environment."
            exit 1
          fi

          if [ -z "$OPERATION_ID" ]; then
            echo "❌ OPERATION_ID is empty. The previous deploy step may have failed."
            exit 1
          fi

          echo "Waiting for deployment to complete... (Operation ID: $OPERATION_ID)"
          for i in $(seq 1 60); do
            # Use list-operations to find the specific operation and get its status
            STATUS=$(aws apprunner list-operations --service-arn "$SERVICE_ARN" --query "OperationSummaryList[?Id=='$OPERATION_ID'].Status" --output text)
            echo "Current status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then
              echo "✅ Deployment succeeded."
              break
            fi
            if [ "$STATUS" = "FAILED" ]; then
              echo "❌ Deployment failed."
              exit 1
            fi
            if [ -z "$STATUS" ]; then
              echo "⚠️ Operation not found in list, checking service status instead..."
              SERVICE_STATUS=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" --query 'Service.Status' --output text)
              echo "Service status: $SERVICE_STATUS"
              if [ "$SERVICE_STATUS" = "RUNNING" ]; then
                echo "✅ Service is running, assuming deployment succeeded."
                break
              fi
            fi
            if [ $i -eq 60 ]; then
              echo "❌ Timeout waiting for deployment."
              exit 1
            fi
            sleep 10
          done

      - name: Verify Deployed Image Tag
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          EXPECTED_IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          # Give a few seconds for describe-service to reflect the new image
          sleep 5
          CURRENT_IMAGE_URI=$(aws apprunner describe-service --service-arn "$SERVICE_ARN" | jq -r '.Service.SourceConfiguration.ImageRepository.ImageIdentifier')
          echo "🔍 Expected Image: $EXPECTED_IMAGE_URI"
          echo "🔍 Deployed Image: $CURRENT_IMAGE_URI"
          if [ "$CURRENT_IMAGE_URI" != "$EXPECTED_IMAGE_URI" ]; then
            echo "❌ Deployed image does not match expected tag. Failing job."
            exit 1
          fi
          echo "✅ Deployed image matches expected tag."
