name: CI/CD Pipeline Build → ECR → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install --prefix apps/user_front

      - name: Build
        run: npm run build --prefix apps/user_front

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/github_action/user_front/Dockerfile .
          docker push $URI
          echo "image-uri=$URI" >> $GITHUB_OUTPUT

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: [build-and-push]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          aws apprunner start-deployment \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\"}}"

      - name: Wait for App Runner Service to Stabilize
        run: |
          SERVICE_ARN="${{ vars.USER_FRONT_APPRUNNER_ARN }}"
          echo "Waiting for service to become stable..."
          aws apprunner wait service-stable --service-arn "$SERVICE_ARN"
