name: CI/CD Pipeline Build → ECR → Lambda → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install root & workspaces
        run: npm install --workspaces

      - name: Install user_front dependencies
        run: npm --workspace=apps/user_front install

      - name: Build user_front
        run: npm --workspace=apps/user_front run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/aws/user_front/Dockerfile .
          docker push $URI
          echo "image_uri=$URI" >> $GITHUB_OUTPUT

      - name: Dump build-and-push outputs
        if: always()
        run: |
          echo ">> DEBUG: ${{ toJson(needs.build-and-push.outputs) }}"

  deploy-lambda:
    name: 🛠 Deploy & Invoke Lambda (Migrations)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Update Lambda from ECR Image
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --image-uri    "${{ needs.build-and-push.outputs.image_uri }}"

      - name: Invoke Migrations Lambda
        run: |
          aws lambda invoke \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --invocation-type Event \
            --payload '{}' \
            /dev/stdout

  deploy-apprunner:
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: deploy-lambda
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        run: |
          SERVICE_ARN="${{ vars.APPRUNNER_SERVICE_ARN }}"
          IMAGE_URI="${{ needs.build-and-push.outputs.image_uri }}"
          aws apprunner update-service \
            --service-arn "$SERVICE_ARN" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE_URI\",\"ImageRepositoryType\":\"ECR\"}}" \
            --region "${{ vars.AWS_REGION }}"

      - name: Wait for App Runner to Stabilize
        run: |
          aws apprunner wait service-stable \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --region "${{ vars.AWS_REGION }}"
