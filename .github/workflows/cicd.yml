name: CI/CD Pipeline Build → ECR → Lambda → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --workspaces

      - name: Build user_front
        run: npm --workspace=apps/user_front run build

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE_URI=${{ steps.login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $IMAGE_URI -f docker/aws/user_front/Dockerfile .
          docker push $IMAGE_URI
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy-lambda:
    name: 🛠 Deploy & Invoke Lambda (Migrations)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Debug IMAGE_URI
        run: echo "Lambda will use image-uri='${{ needs.build-and-push.outputs.image-uri }}'"

      - name: Update Lambda from ECR Image
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --image-uri    "${{ needs.build-and-push.outputs.image-uri }}"

      - name: Invoke Migrations Lambda
        run: |
          aws lambda invoke \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --invocation-type Event \
            --payload '{}' \
            output.json && cat output.json

  deploy-apprunner:
    name: 🚀 Deploy to App Runner via AWS CLI
    needs: deploy-lambda
    runs-on: ubuntu-latest
    env:
      IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}

    steps:
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          audience: sts.amazonaws.com
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:    ${{ vars.AWS_REGION }}

      - name: Debug IMAGE_URI
        run: echo "App Runner will use image-uri='$IMAGE_URI'"

      - name: Deploy App Runner Service
        run: |
          aws apprunner update-service \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration '{"ImageRepository":{"ImageIdentifier":"'"$IMAGE_URI"'","ImageRepositoryType":"ECR"}}' \
            --region "${{ vars.AWS_REGION }}"

      - name: Wait for App Runner Service to Stabilize
        run: |
          aws apprunner wait service-stable \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --region "${{ vars.AWS_REGION }}"
