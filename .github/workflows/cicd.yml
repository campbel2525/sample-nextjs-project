name: CI/CD Pipeline Build → ECR → Lambda → App Runner

on:
  push:
    branches:
      - stg
      - prod
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}
    name: 🚧 Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install root & workspaces
        run: npm install --workspaces

      - name: Install user_front dependencies
        run: npm --workspace=apps/user_front install

      - name: Build user_front
        run: npm --workspace=apps/user_front run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ vars.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/aws/user_front/Dockerfile .
          docker push $URI
          echo "image-uri=$URI" >> $GITHUB_OUTPUT

  deploy-lambda:
    environment: ${{ github.ref_name }}
    name: 🛠 Deploy & Invoke Lambda (Migrations)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Update Lambda from ECR Image
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --image-uri     "${{ needs.build-and-push.outputs.image-uri }}"

      - name: Invoke Migrations Lambda
        run: |
          aws lambda invoke \
            --function-name "${{ vars.MIGRATION_LAMBDA_FUNCTION_NAME }}" \
            --invocation-type Event \
            --payload '{}' \
            /dev/stdout

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    name: 🚀 Deploy and Verify App Runner
    needs: [build-and-push, deploy-lambda]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Deploy App Runner Service
        run: |
          aws apprunner update-service \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"${{ needs.build-and-push.outputs.image-uri }}\",\"ImageRepositoryType\":\"ECR\"}}" \
            --region "${{ vars.AWS_REGION }}"

      # --- ここからが修正・強化した部分 ---
      - name: Wait for Deployment Operation to Complete
        run: |
          # aws-waiterをダウンロードして実行権限を付与
          curl -L -o /usr/local/bin/aws-waiter https://github.com/get-bridge/aws-waiter/releases/download/v2.0.0/aws-waiter_linux_amd64
          chmod +x /usr/local/bin/aws-waiter

          echo "Waiting for the latest deployment operation to complete..."
          aws-waiter \
            --service apprunner \
            --operation ListOperations \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            --query "OperationSummaryList[0].Status" \
            --wait-for SUCCEEDED \
            --fail-on FAILED \
            --timeout 600
          echo "✅ Deployment operation finished."

      - name: Verify Deployed Image
        run: |
          EXPECTED_IMAGE="${{ needs.build-and-push.outputs.image-uri }}"

          # App Runnerで現在実行中のイメージを取得
          DEPLOYED_IMAGE=$(aws apprunner describe-service \
            --service-arn "${{ vars.APPRUNNER_SERVICE_ARN }}" \
            | jq -r '.Service.SourceConfiguration.ImageRepository.ImageIdentifier')

          echo "Expected image: $EXPECTED_IMAGE"
          echo "Deployed image: $DEPLOYED_IMAGE"

          # 期待するイメージと実際にデプロイされたイメージを比較
          if [ "$DEPLOYED_IMAGE" == "$EXPECTED_IMAGE" ]; then
            echo "✅ Successfully verified that the correct image is deployed."
          else
            echo "❌ Verification failed! Deployed image does not match the expected image."
            exit 1
          fi
