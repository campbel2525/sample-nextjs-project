# ワークフロー名：ビルド → ECR プッシュ → Lambda デプロイ → App Runner デプロイ
name: CI/CD Pipeline Build → ECR → Lambda → App Runner

on:
  push:
    branches:
      - stg    # ステージング環境ブランチへのプッシュでトリガー
      - prod   # 本番環境ブランチへのプッシュでトリガー
  workflow_dispatch:  # 手動実行を許可

permissions:
  id-token: write   # OIDC トークン発行を許可
  contents: read    # リポジトリ内容のチェックアウトを許可

jobs:
  build-and-push:
    environment: ${{ github.ref_name }}    # 環境変数はEnvironments→Environment variablesで管理
    env:
      ECR_REPOSITORY_NAME: ${{ vars.ECR_REPOSITORY_NAME }}
    name: 🚧 Build & Push to ECR    # 環境変数はEnvironments→Environment variablesで管理
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}  # プッシュしたイメージ URI を出力

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install root & workspaces
        run: |
          npm install --workspaces

      - name: Install user_front dependencies
        run: |
          npm --workspace=apps/user_front install

      - name: Build user_front
        run: |
          npm --workspace=apps/user_front run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}   # Repository Variables 参照
          aws-region: ${{ vars.AWS_REGION }}      # Repository Variables 参照

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker Image
        id: push
        run: |
          IMAGE_TAG=${{ github.sha }}
          URI=${{ steps.login.outputs.registry }}/${{ env.ECR_REPOSITORY_NAME }}:$IMAGE_TAG
          docker build -t $URI -f docker/aws/user_front/Dockerfile .
          docker push $URI
          echo "::set-output name=image-uri::$URI"

  deploy-lambda:
    environment: ${{ github.ref_name }}
    env:
      MIGRATION_LAMBDA_NAME: ${{ vars.MIGRATION_LAMBDA_NAME }}
    name: 🛠 Deploy & Invoke Lambda (Migrations)
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}   # Repository Variables 参照
          aws-region: ${{ vars.AWS_REGION }}      # Repository Variables 参照

      - name: Update Lambda from ECR Image
        run: |
          aws lambda update-function-code \
            --function-name "${{ env.MIGRATION_LAMBDA_NAME }}" \
            --image-uri "${{ needs.build-and-push.outputs.image-uri }}"

      - name: Invoke Migrations Lambda
        run: |
          aws lambda invoke \
            --function-name "${{ env.MIGRATION_LAMBDA_NAME }}" \
            --invocation-type Event \
            --payload '{}' \
            /dev/stdout

  deploy-apprunner:
    environment: ${{ github.ref_name }}
    env:
      APPRUNNER_SERVICE_ARN: ${{ vars.APPRUNNER_SERVICE_ARN }}
    name: 🚀 Deploy to App Runner
    needs: deploy-lambda
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE_ARN }}   # Repository Variables 参照
          aws-region: ${{ vars.AWS_REGION }}      # Repository Variables 参照

      - name: Deploy App Runner Service
        uses: aws-actions/aws-app-runner-deploy-service@v1
        with:
          service-arn:      ${{ env.APPRUNNER_SERVICE_ARN }}
          image-identifier: ${{ needs.build-and-push.outputs.image-uri }}
          wait-for-service-stability: true
