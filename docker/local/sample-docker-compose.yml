# docker/local/docker-compose.yml

# docker/github_action/user_front/Dockerfile
# docker-compose.yml

version: "3.8"

services:
  # ---------------------------------
  # database
  # ---------------------------------
  db:
    image: mysql/mysql-server:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db-data80:/var/lib/mysql
    ports:
      - "3308:3306"
    networks:
      - shared-network

  # ---------------------------------
  # scripts
  # ---------------------------------
  # scripts:
  #   restart: "no"
  #   tty: true
  #   build:
  #     context: ../../
  #     dockerfile: ./docker/local/scripts/nodejs/Dockerfile
  #   env_file:
  #     - ../../apps/scripts/.env
  #   volumes:
  #     - ../../apps/scripts:/project/apps/scripts
  #     - ../../packages:/project/packages
  #     - ../../package.json:/project/package.json
  #     - ../../package-lock.json:/project/package-lock.json
  #     - ../../eslint.config.mjs:/project/eslint.config.mjs
  #     - ../../tsconfig.json:/project/tsconfig.json
  #     # - /project/node_modules
  #   working_dir: /project
  #   networks:
  #     - shared-network
  #   depends_on:
  #     - db

  # ---------------------------------
  # user_front
  # ---------------------------------
  user_front:
    restart: "no"
    tty: true
    build:
      context: ../../
      dockerfile: ./docker/aws/user_front/Dockerfile
    # env_file:
    #   - ./.env
    environment:
      - DATABASE_URL="mysql://root:secret@db:3306/prisma"
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=N8ak;ZZEX~69e3FKl~P?%;Q;ES(CRg$|%1YfReM6EC<]C]BU.~]sgwTOOU~W!@0I

    ports:
      - "3001:3000"
    # volumes:
    #   - ../../apps/user_front:/project/apps/user_front
    #   - ../../packages:/project/packages
    #   - ../../package.json:/project/package.json
    #   - ../../package-lock.json:/project/package-lock.json
    #   - ../../eslint.config.mjs:/project/eslint.config.mjs
    #   - ../../tsconfig.json:/project/tsconfig.json
    #   # - /project/node_modules
    # working_dir: /project
    networks:
      - shared-network
    depends_on:
      - db

volumes:
  db-data80:

networks:
  shared-network:
    name: ${PROJECT_NAME}-network
